name: Update Cloudflare IP

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - 'ip.txt'
      - 'README.md'

jobs:
  update-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
      
      - name: Run IP update script
        id: run_script
        run: |
          echo "Starting IP optimization..."
          python main.py || true
          echo "Script execution completed"
        env:
          PYTHONIOENCODING: utf-8
          GITHUB_ACTIONS: true
      
      - name: Check for ip.txt
        id: check_files
        run: |
          if [ -f ip.txt ]; then
            echo "ip_exists=true" >> $GITHUB_OUTPUT
            echo "IP file found, size: $(wc -c < ip.txt) bytes"
            head -5 ip.txt
          else
            echo "ip_exists=false" >> $GITHUB_OUTPUT
            echo "Warning: ip.txt not found"
          fi
      
      - name: Commit and push changes
        if: steps.check_files.outputs.ip_exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ip.txt
          timestamp=$(date '+%Y-%m-%d %H:%M:%S')
          git commit -m "Auto update IP list - ${timestamp}" || echo "No changes to commit"
          git push origin master || echo "Push failed or no changes"
      
      - name: Summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **IP File**: ${{ steps.check_files.outputs.ip_exists }}" >> $GITHUB_STEP_SUMMARY
          if [ -f ip.txt ]; then
            echo "- **IP Count**: $(wc -l < ip.txt)" >> $GITHUB_STEP_SUMMARY
          fi
