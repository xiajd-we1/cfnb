name: Update Cloudflare IP

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'ip.txt'
      - 'README.md'

# 2. 全局配置：给Workflow足够的权限，支持push提交
permissions:
  contents: write
  actions: read

jobs:
  update-ip:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # 显式开启权限，确保定时任务能push
          persist-credentials: true
          fetch-depth: 0
          # 用GitHub官方的Action bot身份提交，避免权限问题
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl dnsutils
          python -m pip install --upgrade pip
          pip install requests aiohttp
      
      - name: Configure DNS and Hosts
        run: |
          # 使用Google DNS解析关键域名，添加hosts映射绕过Actions DNS限制
          # zip.cm.edu.kg
          ZIP_IP=$(dig +short zip.cm.edu.kg @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$ZIP_IP" ]; then
            echo "$ZIP_IP zip.cm.edu.kg" | sudo tee -a /etc/hosts
            echo "zip.cm.edu.kg -> $ZIP_IP"
          else
            echo "104.21.54.233 zip.cm.edu.kg" | sudo tee -a /etc/hosts
            echo "zip.cm.edu.kg -> 104.21.54.233 (fallback)"
          fi
          # bestcf.pages.dev
          BESTCF_IP=$(dig +short bestcf.pages.dev @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$BESTCF_IP" ]; then
            echo "$BESTCF_IP bestcf.pages.dev" | sudo tee -a /etc/hosts
            echo "bestcf.pages.dev -> $BESTCF_IP"
          else
            echo "104.21.54.233 bestcf.pages.dev" | sudo tee -a /etc/hosts
            echo "bestcf.pages.dev -> 104.21.54.233 (fallback)"
          fi
          # countrymerge.pages.dev
          CM_IP=$(dig +short countrymerge.pages.dev @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$CM_IP" ]; then
            echo "$CM_IP countrymerge.pages.dev" | sudo tee -a /etc/hosts
            echo "countrymerge.pages.dev -> $CM_IP"
          else
            echo "104.21.54.233 countrymerge.pages.dev" | sudo tee -a /etc/hosts
            echo "countrymerge.pages.dev -> 104.21.54.233 (fallback)"
          fi
          # 090227.xyz系列
          ADDR_IP=$(dig +short addressesapi.090227.xyz @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$ADDR_IP" ]; then
            echo "$ADDR_IP addressesapi.090227.xyz" | sudo tee -a /etc/hosts
            echo "addressesapi.090227.xyz -> $ADDR_IP"
          fi
          IPDB_IP=$(dig +short ipdb.api.030101.xyz @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$IPDB_IP" ]; then
            echo "$IPDB_IP ipdb.api.030101.xyz" | sudo tee -a /etc/hosts
            echo "ipdb.api.030101.xyz -> $IPDB_IP"
          fi
          CF_IP=$(dig +short cf.090227.xyz @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$CF_IP" ]; then
            echo "$CF_IP cf.090227.xyz" | sudo tee -a /etc/hosts
            echo "cf.090227.xyz -> $CF_IP"
          fi
          # api.uouin.com
          UOUIN_IP=$(dig +short api.uouin.com @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$UOUIN_IP" ]; then
            echo "$UOUIN_IP api.uouin.com" | sudo tee -a /etc/hosts
            echo "api.uouin.com -> $UOUIN_IP"
          fi
          # ip.164746.xyz
          IP164_IP=$(dig +short ip.164746.xyz @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$IP164_IP" ]; then
            echo "$IP164_IP ip.164746.xyz" | sudo tee -a /etc/hosts
            echo "ip.164746.xyz -> $IP164_IP"
          fi
          # cf.junzhen.qzz.io
          QZZ_IP=$(dig +short cf.junzhen.qzz.io @8.8.8.8 | grep -E '^[0-9]' | head -1)
          if [ -n "$QZZ_IP" ]; then
            echo "$QZZ_IP cf.junzhen.qzz.io" | sudo tee -a /etc/hosts
            echo "cf.junzhen.qzz.io -> $QZZ_IP"
          fi
          echo "=== hosts配置完成 ==="
          cat /etc/hosts
          # 测试连通性
          echo "测试zip.cm.edu.kg连通性："
          curl -sI --max-time 5 https://zip.cm.edu.kg/all.txt 2>&1 | head -3 || echo "连通性测试跳过"

      - name: Run IP update script
        id: run_script
        run: |
          echo "=========================================="
          echo "Starting Cloudflare IP Optimization..."
          echo "UTC Time: $(date)"
          echo "Beijing Time: $(date -d '+8 hours')"
          echo "=========================================="
          python main.py
          echo "=========================================="
          echo "Script execution completed"
          echo "=========================================="
        env:
          PYTHONIOENCODING: utf-8
          GITHUB_ACTIONS: true
          WORKERS_DOMAIN: xin21.whdiah23ouo.dpdns.org
      
      - name: Check for ip.txt
        id: check_files
        run: |
          echo "Checking for ip.txt file..."
          if [ -f ip.txt ]; then
            FILE_SIZE=$(wc -c < ip.txt)
            FILE_LINES=$(wc -l < ip.txt)
            echo "ip_exists=true" >> $GITHUB_OUTPUT
            echo "✅ IP file found!"
            echo "   Size: $FILE_SIZE bytes"
            echo "   Lines: $FILE_LINES"
            echo ""
            echo "=== First 5 IPs ==="
            head -5 ip.txt
            echo ""
            echo "=== Last 5 IPs ==="
            tail -5 ip.txt
          else
            echo "ip_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Warning: ip.txt not found!"
            exit 1
          fi
      
      - name: Commit and push changes
        if: steps.check_files.outputs.ip_exists == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ip.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping push"
          else
            timestamp=$(date '+%Y-%m-%d %H:%M:%S UTC')
            ip_count=$(wc -l < ip.txt)
            git commit -m "🤖 Auto update IP list ($ip_count IPs) - ${timestamp}"
            
            echo "Pushing to main branch..."
            git push origin main || {
              echo "Push failed, retrying in 10 seconds..."
              sleep 10
              git push origin main || echo "Push failed after retry"
            }
          fi
      
      - name: Summary
        if: always()
        run: |
          echo "# 🚀 Cloudflare IP Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UTC Time**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Beijing Time**: $(date -d '+8 hours' '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_files.outputs.ip_exists }}" = "true" ]; then
            echo "## ✅ Success" >> $GITHUB_STEP_SUMMARY
            echo "- **IP File**: Generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "- **IP Count**: $(wc -l < ip.txt)" >> $GITHUB_STEP_SUMMARY
            echo "- **File Size**: $(wc -c < ip.txt) bytes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📱 Subscription URL" >> $GITHUB_STEP_SUMMARY
            echo "https://raw.githubusercontent.com/xiajd-we1/cfnb/main/ip.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Failed" >> $GITHUB_STEP_SUMMARY
            echo "- **IP File**: Not generated" >> $GITHUB_STEP_SUMMARY
          fi
